nameOverride: ""
fullnameOverride: ""
namespace: drone-delivery
imagePullPolicy: IfNotPresent

mongo:
  image: mongo:8.0.4
  service:
    port: 27017
  auth:
    username: root
    password: change-me
    database: drone_system
  persistence:
    size: 8Gi
    storageClassName: ""

workloads:
  auth-service:
    enabled: true
    replicas: 1
    image: docker.io/khiempg225868/auth-service:v2.0.9
    port: 5001
    containerPort: 5001
    metrics:
      enabled: true
      path: /metrics
    env:
      PORT: "5001"
      DATABASE_NAME: "{{ .Values.mongo.auth.database }}"
      MONGO_URI: "mongodb://{{ .Values.mongo.auth.username }}:{{ .Values.mongo.auth.password }}@{{ include \"drone-delivery.mongoServiceName\" . }}:{{ .Values.mongo.service.port }}/{{ .Values.mongo.auth.database }}?authSource=admin"
      JWT_SECRET: "change-me"
      JWT_EXPIRATION: "1d"
      OTEL_SERVICE_NAME: "auth-service"
      OTEL_EXPORTER_ZIPKIN_ENDPOINT: "http://jaeger-collector.tracing.svc.cluster.local:9411/api/v2/spans"
      OTEL_TRACES_EXPORTER: "zipkin"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
  delivery-service:
    enabled: true
    replicas: 1
    image: docker.io/khiempg225868/delivery-service:v2.0.9
    port: 5002
    containerPort: 5002
    metrics:
      enabled: true
      path: /metrics
    env:
      PORT: "5002"
      DATABASE_NAME: "{{ .Values.mongo.auth.database }}"
      MONGO_URI: "mongodb://{{ .Values.mongo.auth.username }}:{{ .Values.mongo.auth.password }}@{{ include \"drone-delivery.mongoServiceName\" . }}:{{ .Values.mongo.service.port }}/{{ .Values.mongo.auth.database }}?authSource=admin"
      JWT_SECRET: "change-me"
      JWT_EXPIRATION: "1d"
      OTEL_SERVICE_NAME: "delivery-service"
      OTEL_EXPORTER_ZIPKIN_ENDPOINT: "http://jaeger-collector.tracing.svc.cluster.local:9411/api/v2/spans"
      OTEL_TRACES_EXPORTER: "zipkin"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
  order-service:
    enabled: true
    replicas: 1
    image: docker.io/khiempg225868/order-service:v2.0.9
    port: 5003
    containerPort: 5003
    metrics:
      enabled: true
      path: /metrics
    env:
      PORT: "5003"
      DATABASE_NAME: "{{ .Values.mongo.auth.database }}"
      MONGO_URI: "mongodb://{{ .Values.mongo.auth.username }}:{{ .Values.mongo.auth.password }}@{{ include \"drone-delivery.mongoServiceName\" . }}:{{ .Values.mongo.service.port }}/{{ .Values.mongo.auth.database }}?authSource=admin"
      PYTHON_OPTIMIZER_URL: "http://{{ include \"drone-delivery.fullname\" . }}-python-optimizer:8001/optimize"
      OTEL_SERVICE_NAME: "order-service"
      OTEL_EXPORTER_ZIPKIN_ENDPOINT: "http://jaeger-collector.tracing.svc.cluster.local:9411/api/v2/spans"
      OTEL_TRACES_EXPORTER: "zipkin"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
  notification-service:
    enabled: true
    replicas: 1
    image: docker.io/khiempg225868/notification-service:v2.0.9
    port: 5004
    containerPort: 5004
    metrics:
      enabled: true
      path: /metrics
    env:
      PORT: "5004"
      DATABASE_NAME: "{{ .Values.mongo.auth.database }}"
      MONGO_URI: "mongodb://{{ .Values.mongo.auth.username }}:{{ .Values.mongo.auth.password }}@{{ include \"drone-delivery.mongoServiceName\" . }}:{{ .Values.mongo.service.port }}/{{ .Values.mongo.auth.database }}?authSource=admin"
      OTEL_SERVICE_NAME: "notification-service"
      OTEL_EXPORTER_ZIPKIN_ENDPOINT: "http://jaeger-collector.tracing.svc.cluster.local:9411/api/v2/spans"
      OTEL_TRACES_EXPORTER: "zipkin"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
  python-optimizer:
    enabled: true
    replicas: 1
    image: docker.io/khiempg225868/python-optimizer:v2.0.9
    port: 8001
    containerPort: 8001
    metrics:
      enabled: true
      path: /metrics
    command:
      - uvicorn
    args:
      - optimizer_service:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
    env:
      PORT: "8001"
      OTEL_SERVICE_NAME: "python-optimizer"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector.tracing.svc.cluster.local:4318"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://jaeger-collector.tracing.svc.cluster.local:4318/v1/traces"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
  frontend:
    enabled: true
    replicas: 1
    image: docker.io/khiempg225868/frontend:v2.0.9
    serviceType: NodePort
    port: 80
    containerPort: 8080
    env:
      APP_API_BASE_URL: /api
      APP_API_AUTH_URL: /api
      APP_API_DELIVERY_URL: /api
      APP_API_ORDER_URL: /api
      APP_API_NOTIFICATION_URL: /api
    gateway:
      enabled: false
      className: ""
      host: drone.local

ingress:
  enabled: true
  className: nginx
  host: drone.local
  tls:
    enabled: true
    secretName: drone-delivery-tls
