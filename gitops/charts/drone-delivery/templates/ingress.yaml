{{- if .Values.ingress.enabled }}
{{- $workloads := .Values.workloads -}}
{{- $auth := index $workloads "auth-service" -}}
{{- $delivery := index $workloads "delivery-service" -}}
{{- $order := index $workloads "order-service" -}}
{{- $notification := index $workloads "notification-service" -}}
{{- $frontend := index $workloads "frontend" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "drone-delivery.fullname" . }}-ingress
  labels:
    {{- include "drone-delivery.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api/account
            pathType: Prefix
            backend:
              service:
                name: {{ include "drone-delivery.fullname" . }}-auth-service
                port:
                  number: {{ $auth.port }}
          - path: /api/location
            pathType: Prefix
            backend:
              service:
                name: {{ include "drone-delivery.fullname" . }}-order-service
                port:
                  number: {{ $order.port }}
          - path: /api/deliveries
            pathType: Prefix
            backend:
              service:
                name: {{ include "drone-delivery.fullname" . }}-delivery-service
                port:
                  number: {{ $delivery.port }}
          - path: /api/drones
            pathType: Prefix
            backend:
              service:
                name: {{ include "drone-delivery.fullname" . }}-delivery-service
                port:
                  number: {{ $delivery.port }}
          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: {{ include "drone-delivery.fullname" . }}-notification-service
                port:
                  number: {{ $notification.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "drone-delivery.fullname" . }}-frontend
                port:
                  number: {{ $frontend.port }}
{{- end }}
