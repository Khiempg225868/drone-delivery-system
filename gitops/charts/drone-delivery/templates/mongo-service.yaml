apiVersion: v1
kind: Service
metadata:
  name: {{ include "drone-delivery.mongoServiceName" . }}
  labels:
    {{- include "drone-delivery.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
spec:
  clusterIP: None
  ports:
    - name: mongo
      port: {{ .Values.mongo.service.port }}
      targetPort: mongo
  selector:
    {{- include "drone-delivery.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
