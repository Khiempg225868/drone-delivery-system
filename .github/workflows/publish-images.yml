name: Publish Docker Hub images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish and write into Helm values
        required: true
        type: string

env:
  DOCKERHUB_NAMESPACE: khiempg225868
  REGISTRY: docker.io
  IMAGE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-service
            context: ./services/auth-service
          - name: delivery-service
            context: ./services/delivery-service
          - name: order-service
            context: ./services/order-service
          - name: notification-service
            context: ./services/notification-service
          - name: python-optimizer
            context: ./algorithm
          - name: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha
          flavor: |
            latest=false

      - name: Build image locally for Trivy scan
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.name }}:${{ env.IMAGE_TAG }}
          format: 'table'
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image tags
        run: |
          printf '%s\n' "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Pushing $tag"
            docker push "$tag"
          done

  update-helm-values:
    name: Update Helm image tags
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update Helm values with release tag
        run: python scripts/update-helm-image-tags.py "$DOCKERHUB_NAMESPACE" "$IMAGE_TAG"

      - name: Commit and push Helm tag update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/charts/drone-delivery/values.yaml gitops/charts/drone-delivery/values-dev.yaml gitops/charts/drone-delivery/values-prod.yaml
          if git diff --cached --quiet; then
            echo "No Helm changes to commit."
            exit 0
          fi
          git commit -m "chore(gitops): bump image tags to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
